name: Swift Format Lint

on:
    push:
        branches: [main]
        paths:
            - "**.swift"
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    lint:
        name: Format Lint
        runs-on: macos-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Check Format
              run: swift format lint -prs .
