<div class="relative w-64" x-data="{
    selectOpen: false,
    selectedItem: '',
    selectableItems: [{&quot;disabled&quot;:false,&quot;title&quot;:&quot;Milk&quot;,&quot;value&quot;:&quot;milk&quot;},{&quot;disabled&quot;:true,&quot;title&quot;:&quot;Cheese&quot;,&quot;value&quot;:&quot;cheese&quot;}],
    selectableItemActive: null,
    selectId: $id('select'),
    selectKeydownValue: '',
    selectKeydownTimeout: 1000,
    selectKeydownClearTimeout: null,
    selectDropdownPosition: 'bottom',
    selectableItemIsActive(item) {
        return this.selectableItemActive &amp;&amp; this.selectableItemActive.value==item.value;
    },
    selectableItemActiveNext(){
        let index = this.selectableItems.indexOf(this.selectableItemActive);
        if(index < this.selectableItems.length-1){
            this.selectableItemActive = this.selectableItems[index+1];
            this.selectScrollToActiveItem();
        }
    },
    selectableItemActivePrevious(){
        let index = this.selectableItems.indexOf(this.selectableItemActive);
        if(index > 0){
            this.selectableItemActive = this.selectableItems[index-1];
            this.selectScrollToActiveItem();
        }
    },
    selectScrollToActiveItem(){
        if(this.selectableItemActive){
            activeElement = document.getElementById(this.selectableItemActive.value + '-' + this.selectId)
            newScrollPos = (activeElement.offsetTop + activeElement.offsetHeight) - this.$refs.selectableItemsList.offsetHeight;
            if(newScrollPos > 0){
                this.$refs.selectableItemsList.scrollTop=newScrollPos;
            } else {
                this.$refs.selectableItemsList.scrollTop=0;
            }
        }
    },
    selectKeydown(event){
        if (event.keyCode >= 65 &amp;&amp; event.keyCode <= 90) {
            this.selectKeydownValue += event.key;
            selectedItemBestMatch = this.selectItemsFindBestMatch();
            if(selectedItemBestMatch){
                if(this.selectOpen){
                    this.selectableItemActive = selectedItemBestMatch;
                    this.selectScrollToActiveItem();
                } else {
                    this.selectedItem = this.selectableItemActive = selectedItemBestMatch;
                }
            }
            if(this.selectKeydownValue != ''){
                clearTimeout(this.selectKeydownClearTimeout);
                this.selectKeydownClearTimeout = setTimeout(() => {
                    this.selectKeydownValue = '';
                }, this.selectKeydownTimeout);
            }
        }
    },
    selectItemsFindBestMatch(){
        typedValue = this.selectKeydownValue.toLowerCase();
        var bestMatch = null;
        var bestMatchIndex = -1;
        for (var i = 0; i < this.selectableItems.length; i++) {
            var title = this.selectableItems[i].title.toLowerCase();
            var index = title.indexOf(typedValue);
            if (index > -1 &amp;&amp; (bestMatchIndex == -1 || index < bestMatchIndex) &amp;&amp; !this.selectableItems[i].disabled) {
                bestMatch = this.selectableItems[i];
                bestMatchIndex = index;
            }
        }
        return bestMatch;
    },
    selectPositionUpdate(){
        selectDropdownBottomPos = this.$refs.selectButton.getBoundingClientRect().top + this.$refs.selectButton.offsetHeight + parseInt(window.getComputedStyle(this.$refs.selectableItemsList).maxHeight);
        if(window.innerHeight < selectDropdownBottomPos){
            this.selectDropdownPosition = 'top';
        } else {
            this.selectDropdownPosition = 'bottom';
        }
    }
}" x-init="$watch('selectOpen', function(){
    if(!selectedItem){
        selectableItemActive=selectableItems[0];
    } else {
        selectableItemActive=selectedItem;
    }
    setTimeout(function(){
        selectScrollToActiveItem();
    }, 10);
    selectPositionUpdate();
    window.addEventListener('resize', (event) => { selectPositionUpdate(); });
});" x-on:keydown.escape="if(selectOpen){ selectOpen=false; }" x-on:keydown.down="if(selectOpen){ selectableItemActiveNext(); } else { selectOpen=true; } event.preventDefault();" x-on:keydown.up="if(selectOpen){ selectableItemActivePrevious(); } else { selectOpen=true; } event.preventDefault();" x-on:keydown.enter="selectedItem=selectableItemActive; selectOpen=false;" x-on:keydown="selectKeydown($event);"><button x-ref="selectButton" x-on:click="selectOpen=!selectOpen" x-bind:class="{ 'focus:ring-2 focus:ring-offset-2 focus:ring-neutral-400' : !selectOpen }" class="relative min-h-[38px] flex items-center justify-between w-full py-2 pl-3 pr-10 text-left bg-white border rounded-md shadow-sm cursor-default border-neutral-200/70 focus:outline-none text-sm"><span x-text="selectedItem ? selectedItem.title : 'Select Item'" class="truncate">Select Item</span><span class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path d="m19.5 8.25-7.5 7.5-7.5-7.5" stroke-linecap="round" stroke-linejoin="round" /></svg></span></button><ul x-show="selectOpen" x-ref="selectableItemsList" x-on:click.outside="selectOpen = false" x-transition:enter="transition ease-out duration-50" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100" x-bind:class="{ 'bottom-0 mb-10' : selectDropdownPosition == 'top', 'top-0 mt-10' : selectDropdownPosition == 'bottom' }" x-cloak class="absolute w-full py-1 mt-1 overflow-auto text-sm bg-white rounded-md shadow-md max-h-56 ring-1 ring-black ring-opacity-5 focus:outline-none"><template x-for="item in selectableItems" x-bind:key="item.value"><li x-on:click="selectedItem=item; selectOpen=false; $refs.selectButton.focus();" x-bind:id="item.value + '-' + selectId" x-bind:data-disabled="item.disabled" x-bind:class="{ 'bg-neutral-100 text-gray-900' : selectableItemIsActive(item), '' : !selectableItemIsActive(item) }" x-on:mousemove="selectableItemActive=item" class="relative flex items-center h-full py-2 pl-8 text-gray-700 cursor-default select-none data-[disabled]:opacity-50 data-[disabled]:pointer-events-none"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 absolute left-0 ml-2 text-neutral-400" x-show="selectedItem.value==item.value"><path d="M4.5 12.75l6 6 9-13.5" stroke-linecap="round" stroke-linejoin="round" /></svg><span class="block font-medium truncate" x-text="item.title"></span></li></template></ul></div>
