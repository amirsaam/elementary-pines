<div class="flex items-center justify-center space-x-2" x-data="{ switchOn: false }"><input id="wifi" type="checkbox" name="wifi" class="hidden" x-bind:checked="switchOn"><button x-ref="switchButton" type="button" x-on:click="switchOn = !switchOn" x-bind:class="{ 'bg-green-600' : switchOn, 'bg-neutral-200' : !switchOn }" class="relative inline-flex h-6 py-0.5 ml-4 focus:outline-none rounded-full w-10" x-cloak><span class="w-5 h-5 duration-200 ease-in-out bg-white rounded-full shadow-md" x-bind:class="{ 'translate-x-[18px]' : switchOn, 'translate-x-0.5' : !switchOn }"></span></button><label x-on:click="$refs.switchButton.click(); $refs.switchButton.focus()" x-bind:id="$id('switch')" x-bind:class="{ 'text-green-600' : switchOn, 'text-gray-400' : !switchOn }" class="text-sm select-none" x-cloak>Wi-Fi</label></div>
