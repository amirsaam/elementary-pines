<div class="flex items-center justify-center space-x-2" x-data="{ switchOn: false }"><input id="small" type="checkbox" name="small" class="hidden" x-bind:checked="switchOn"><button x-ref="switchButton" type="button" x-on:click="switchOn = !switchOn" x-bind:class="{ 'bg-blue-600' : switchOn, 'bg-neutral-200' : !switchOn }" class="relative inline-flex h-4 py-0.5 ml-4 rounded-full focus:outline-none w-6" x-cloak><span class="w-3 h-3 duration-200 ease-in-out bg-white rounded-full shadow-md" x-bind:class="{ 'translate-x-[10px]' : switchOn, 'translate-x-0.5' : !switchOn }"></span></button><label x-on:click="$refs.switchButton.click(); $refs.switchButton.focus()" x-bind:id="$id('switch')" x-bind:class="{ 'text-blue-900' : switchOn, 'text-gray-400' : !switchOn }" class="text-xs font-medium select-none" x-cloak>Small</label></div>
